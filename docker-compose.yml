# Inclusify Docker Compose
# Development and production service orchestration
#
# Usage:
#   Development: docker compose --profile dev up
#   Production:  docker compose --profile prod up
#   Build all:   docker compose build

services:
  # ============================================
  # PostgreSQL Database (dev only)
  # ============================================
  postgres:
    image: postgres:16-alpine
    profiles:
      - dev
    environment:
      POSTGRES_DB: ${PGDATABASE:-inclusify}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis (dev only — refresh token storage)
  # ============================================
  redis:
    image: redis:7-alpine
    profiles:
      - dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================
  # Azurite — local Azure Blob Storage emulator
  # ============================================
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    profiles:
      - dev
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --skipApiVersionCheck
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:10000/devstoreaccount1 2>/dev/null; ret=$$?; [ $$ret -eq 0 ] || [ $$ret -eq 1 ] || [ $$ret -eq 8 ]"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================
  # FastAPI Backend
  # ============================================
  backend:
    profiles:
      - dev
      - prod
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
      target: ${BUILD_TARGET:-development}
      args:
        BUILD_TIME: ${BUILD_TIME:-}
        GIT_COMMIT: ${GIT_COMMIT:-}
    environment:
      - PGHOST=${PGHOST:-postgres}
      - PGPORT=${PGPORT:-5432}
      - PGDATABASE=${PGDATABASE:-inclusify}
      - PGUSER=${PGUSER:-postgres}
      - PGPASSWORD=${PGPASSWORD:-devpassword}
      - PGSSL=${PGSSL:-}
      # Redis
      - REDIS_URL=redis://redis:6379
      # Authentication
      - JWT_SECRET=${JWT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      # Email
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-Inclusify <onboarding@resend.dev>}
      # CORS
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      # LLM inference service (transformers-based, not vLLM)
      - VLLM_URL=${VLLM_URL:-http://52.224.246.238:8001}
      # Blob storage (Azurite locally, Azure Blob in prod)
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;}
      - AZURE_STORAGE_CONTAINER=${AZURE_STORAGE_CONTAINER:-texts}
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot-reload in dev
      - ./backend:/app:cached
      # Persist uploaded text files across container restarts
      - ./backend/text_store:/app/text_store
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
      azurite:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Next.js Frontend
  # ============================================
  frontend:
    profiles:
      - dev
      - prod
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      target: ${BUILD_TARGET:-development}
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      # Hot-reload file watching — required on Mac/WSL inside Docker
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    volumes:
      # Mount source for hot-reload in dev
      - ./frontend:/app:cached
      # Preserve container node_modules
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
  azurite_data:
