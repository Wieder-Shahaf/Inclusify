version: "3.9"

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: inclusify-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inclusify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../../db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inclusify"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for refresh token storage
  redis:
    image: redis:7-alpine
    container_name: inclusify-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI backend
  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    container_name: inclusify-backend
    environment:
      # PostgreSQL connection
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: inclusify
      PGUSER: postgres
      PGPASSWORD: postgres
      # Redis connection
      REDIS_URL: redis://redis:6379
      # JWT secret (override in production)
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js frontend
  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/frontend.Dockerfile
    container_name: inclusify-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
