name: vLLM Integration Tests

on:
  workflow_dispatch:
    inputs:
      vllm_url:
        description: 'vLLM endpoint URL (leave blank to use VLLM_URL secret)'
        required: false
        default: ''
  schedule:
    # Nightly at 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  vllm-integration:
    name: vLLM Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend && pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Resolve vLLM URL
        id: resolve_url
        run: |
          # Manual trigger can override; otherwise fall back to repo secret
          URL="${{ github.event.inputs.vllm_url }}"
          if [ -z "$URL" ]; then
            URL="${{ secrets.VLLM_URL }}"
          fi
          if [ -z "$URL" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "ERROR: VLLM_URL secret is not set; scheduled run has no target."
            exit 1
          fi
          echo "vllm_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Run vLLM integration tests
        run: cd backend && python -m pytest tests/test_vllm_integration.py -v --tb=short
        env:
          VLLM_URL: ${{ steps.resolve_url.outputs.vllm_url }}
          JWT_SECRET: "test-secret"
          PGHOST: ""
          PGPASSWORD: ""
