name: CI

on:
  pull_request:
  push:
    branches: [ main, develop, feature/* ]

jobs:
  sanity:
    name: Repository Sanity Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check repo structure exists
        run: |
          test -d frontend
          test -d backend
          test -d ml
          test -d shared
          test -d infra
          test -d docs

      - name: Fail if .env committed
        run: |
          if git ls-files | grep -E '^\.env$' ; then
            echo "❌ .env must not be committed"
            exit 1
          fi
          echo "✅ No .env files committed"

      - name: Check for secrets in code
        run: |
          if git grep -E 'API_KEY|SECRET|PASSWORD|TOKEN' -- '*.py' '*.ts' '*.tsx' | grep -v 'NEXT_PUBLIC_' | grep -v 'example'; then
            echo "⚠️  Potential secrets found in code"
            exit 1
          fi
          echo "✅ No obvious secrets in code"

  frontend-lint:
    name: Frontend Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

  backend-lint:
    name: Backend Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Run ruff
        run: |
          cd backend
          ruff check .

      - name: Run mypy
        run: |
          cd backend
          mypy app/ --ignore-missing-imports

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Frontend npm audit
        run: |
          cd frontend
          npm audit --audit-level=moderate || true

      - name: Backend pip audit
        run: |
          cd backend
          pip install pip-audit
          pip-audit -r requirements.txt || true
